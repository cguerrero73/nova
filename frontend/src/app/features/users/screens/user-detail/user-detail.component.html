<div class="p-6">
  <div class="mb-6">
    <a routerLink="/users" class="text-sm text-gray-500 hover:text-gray-700">← Back to Users</a>
  </div>

  @if (isLoading()) {
    <div class="flex items-center justify-center py-12">
      <div class="h-8 w-8 animate-spin rounded-full border-4 border-primary-200 border-t-primary-600"></div>
    </div>
  } @else if (user()) {
    <div class="rounded-lg border border-gray-200 bg-white shadow">
      <div class="border-b border-gray-200 px-6 py-4">
        <h1 class="text-xl font-semibold text-gray-900">
          {{ isNewMode() ? 'Crear Usuario' : 'Editar Usuario' }}
        </h1>
      </div>
      
      <div class="p-6">
        <form (ngSubmit)="saveUser()" class="space-y-6">
          <!-- ID (solo mostrar en modo edición) -->
          @if (!isNewMode()) {
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">ID</label>
              <input
                type="text"
                [value]="user()?.id"
                disabled
                class="w-full px-3 py-2 border border-gray-300 rounded-md bg-gray-100 text-gray-500"
              />
            </div>
          }

          <!-- Name -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Nombre</label>
            <input
              type="text"
              [value]="user()?.name"
              (input)="onFieldChange('name', $any($event.target).value)"
              required
              class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
              placeholder="Nombre completo"
            />
          </div>

          <!-- Email -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
            <input
              type="email"
              [value]="user()?.email"
              (input)="onFieldChange('email', $any($event.target).value)"
              required
              class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
              placeholder="correo@ejemplo.com"
            />
          </div>

          <!-- Status -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Estado</label>
            <select
              [value]="user()?.status"
              (change)="onFieldChange('status', $any($event.target).value)"
              class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
            >
              <option value="active">Activo</option>
              <option value="inactive">Inactivo</option>
              <option value="suspended">Suspendido</option>
            </select>
          </div>
        </form>
      </div>
    </div>
  } @else {
    <div class="rounded-lg border border-gray-200 bg-white p-12 text-center">
      <p class="text-gray-500">User not found</p>
      <a routerLink="/users" class="mt-4 inline-block text-primary-600 hover:text-primary-800">
        Back to list
      </a>
    </div>
  }
</div>
