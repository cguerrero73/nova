<div class="min-h-screen flex items-center justify-center bg-gray-50 dark:bg-gray-900 px-4">
  <div class="w-full max-w-md">
    <!-- Logo / Title -->
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-gray-900 dark:text-white">{{ t['title'] }}</h1>
      <p class="text-gray-600 dark:text-gray-400 mt-2">
        {{ mode() === 'login' ? t['subtitle'] : t['subtitle'] }}
      </p>
    </div>

    <!-- Card -->
    <div class="bg-white dark:bg-gray-800 rounded-lg shadow-lg p-8">
      <!-- Error Alert -->
      @if (errorMessage()) {
        <div class="mb-4 p-4 bg-red-50 dark:bg-red-900/30 border border-red-200 dark:border-red-800 rounded-md">
          <p class="text-sm text-red-600 dark:text-red-400">{{ errorMessage() }}</p>
        </div>
      }

      <!-- Form -->
      <form (ngSubmit)="onSubmit()" class="space-y-6">
        <!-- Name (only for register) -->
        @if (mode() === 'register') {
          <div>
            <label for="name" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
              {{ t['form.name.label'] }}
            </label>
            <input
              type="text"
              id="name"
              [ngModel]="name()"
              (ngModelChange)="name.set($event)"
              name="name"
              required
              class="w-full px-4 py-3 rounded-md border border-gray-300 dark:border-gray-600 
                     bg-white dark:bg-gray-700 text-gray-900 dark:text-white
                     focus:ring-2 focus:ring-blue-500 focus:border-transparent
                     disabled:opacity-50 disabled:cursor-not-allowed"
              placeholder="Juan Pérez"
            />
          </div>
        }

        <!-- Email -->
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
            {{ t['form.email.label'] }}
          </label>
          <input
            type="email"
            id="email"
            [ngModel]="email()"
            (ngModelChange)="email.set($event)"
            name="email"
            required
            autocomplete="email"
            class="w-full px-4 py-3 rounded-md border border-gray-300 dark:border-gray-600 
                   bg-white dark:bg-gray-700 text-gray-900 dark:text-white
                   focus:ring-2 focus:ring-blue-500 focus:border-transparent
                   disabled:opacity-50 disabled:cursor-not-allowed"
            placeholder="juan@ejemplo.com"
          />
        </div>

        <!-- Password -->
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
            {{ t['form.password.label'] }}
          </label>
          <div class="relative">
            <input
              [type]="showPassword() ? 'text' : 'password'"
              id="password"
              [ngModel]="password()"
              (ngModelChange)="password.set($event)"
              name="password"
              required
              autocomplete="current-password"
              class="w-full px-4 py-3 pr-12 rounded-md border border-gray-300 dark:border-gray-600 
                     bg-white dark:bg-gray-700 text-gray-900 dark:text-white
                     focus:ring-2 focus:ring-blue-500 focus:border-transparent
                     disabled:opacity-50 disabled:cursor-not-allowed"
              placeholder="••••••••"
            />
            <!-- Toggle Password Visibility -->
            <button
              type="button"
              (click)="togglePasswordVisibility()"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-700 dark:hover:text-gray-300"
            >
              @if (showPassword()) {
                <!-- Eye Off Icon -->
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                        d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
                </svg>
              } @else {
                <!-- Eye Icon -->
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                        d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                </svg>
              }
            </button>
          </div>
        </div>

        <!-- Remember Me (only login) -->
        @if (mode() === 'login') {
          <div class="flex items-center">
            <input
              type="checkbox"
              id="rememberMe"
              [ngModel]="rememberMe()"
              (ngModelChange)="rememberMe.set($event)"
              name="rememberMe"
              class="h-4 w-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500 dark:border-gray-600 dark:bg-gray-700"
            />
            <label for="rememberMe" class="ml-2 block text-sm text-gray-700 dark:text-gray-300">
              {{ t['form.remember.label'] }}
            </label>
          </div>
        }

        <!-- Submit Button -->
        <button
          type="submit"
          [disabled]="isLoading()"
          class="w-full py-3 px-4 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-md
                 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2
                 disabled:opacity50 disabled:cursor-not-allowed transition-colors duration-200"
        >
          @if (isLoading()) {
            <span class="inline-flex items-center">
              <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
              Procesando...
            </span>
          } @else {
            {{ mode() === 'login' ? t['button.submit.login'] : t['button.submit.register'] }}
          }
        </button>
      </form>

      <!-- Toggle Mode -->
      <div class="mt-6 text-center">
        @if (mode() === 'login') {
          <p class="text-sm text-gray-600 dark:text-gray-400">
            {{ t['button.toggle.login'] }}
            <button
              type="button"
              (click)="toggleMode()"
              class="text-blue-600 hover:text-blue-700 dark:text-blue-400 dark:hover:text-blue-300 font-medium"
            >
              {{ t['link.register'] }}
            </button>
          </p>
        } @else {
          <p class="text-sm text-gray-600 dark:text-gray-400">
            {{ t['button.toggle.register'] }}
            <button
              type="button"
              (click)="toggleMode()"
              class="text-blue-600 hover:text-blue-700 dark:text-blue-400 dark:hover:text-blue-300 font-medium"
            >
              {{ t['link.login'] }}
            </button>
          </p>
        }
      </div>
    </div>
  </div>
</div>
