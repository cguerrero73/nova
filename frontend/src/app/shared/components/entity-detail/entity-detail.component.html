<!-- Entity Detail Panel - ocupa todo el espacio disponible -->
@if (isOpen()) {
  <div class="flex h-full min-h-0">
    <!-- Splitter bar vertical (doble click para cerrar) - ocupa todo el alto -->
    <div 
      class="w-4 flex-shrink-0 flex items-center justify-center cursor-col-resize select-none"
      [style.background-color]="'var(--color-surface)'"
      [style.border-color]="'var(--color-border)'"
      [style.border-right-width]="'1px'"
      [style.border-right-style]="'solid'"
      (dblclick)="onClose()"
      title="Doble click para cerrar"
    >
      <!-- Handle visual -->
      <div class="h-full w-px bg-gray-300 dark:bg-gray-600"></div>
    </div>

    <!-- Panel de detalle (ocupa todo el espacio restante) -->
    <div class="flex-1 flex flex-col min-w-0"
         [style.background-color]="'var(--color-background)'">
      
      <!-- Header -->
      <div class="flex items-center justify-between px-4 py-3 border-b flex-shrink-0"
           [style.border-color]="'var(--color-border)'"
           [style.background-color]="'var(--color-surface)'">
        <div class="flex items-center gap-3 min-w-0">
          <button 
            (click)="onClose()"
            class="p-1 rounded hover:bg-gray-100 dark:hover:bg-gray-700 flex-shrink-0"
            title="Cerrar (doble click en barra)"
          >
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
          <div class="min-w-0">
            <h2 class="text-lg font-semibold truncate">{{ title() }}</h2>
            @if (subtitle()) {
              <p class="text-sm text-gray-500 dark:text-gray-400 truncate">{{ subtitle() }}</p>
            }
          </div>
        </div>
      </div>

      <!-- Tabs -->
      <div class="flex border-b flex-shrink-0" [style.border-color]="'var(--color-border)'" [style.background-color]="'var(--color-surface)'">
        @for (tab of tabs(); track tab.id) {
          <button
            (click)="setActiveTab(tab.id)"
            class="px-6 py-3 text-sm font-medium border-b-2 transition-colors whitespace-nowrap"
            [class.border-primary-600]="activeTab() === tab.id"
            [class.text-primary-600]="activeTab() === tab.id"
            [class.border-transparent]="activeTab() !== tab.id"
            [class.text-gray-500]="activeTab() !== tab.id"
            [class.hover:text-gray-700]="activeTab() !== tab.id"
            [class.dark:hover:text-gray-300]="activeTab() !== tab.id"
          >
            {{ tab.label }}
          </button>
        }
      </div>

      <!-- Content - renderiza el template de la pestaña activa -->
      <div class="flex-1 overflow-auto p-4 min-h-0">
        <ng-container *ngTemplateOutlet="getActiveTemplate()"></ng-container>
      </div>

      <!-- Footer con estado -->
      <div class="px-4 py-2 border-t flex items-center justify-between text-xs text-gray-500 flex-shrink-0"
           [style.border-color]="'var(--color-border)'"
           [style.background-color]="'var(--color-surface)'">
        <span>ID: {{ entityId() }}</span>
        
        @if (isSavingCheck()) {
          <span class="flex items-center gap-2">
            <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
            Guardando...
          </span>
        } @else if (isLoading()) {
          <span>Cargando...</span>
        }
      </div>
    </div>
  </div>
}
